name: Patch ContinueWatching button

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-continuewatching-button.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch file
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path('ContinueWatching.js')
          s = p.read_text(encoding='utf-8')
          old = s

          s = s.replace("var PLUGIN_VERSION = 'v3.1.1-button-dedup-20260511';", "var PLUGIN_VERSION = 'v3.1.2-button-global-dedup-20260511';")

          marker = 'CONTINUE_WATCH_DDD_GLOBAL_BUTTON_DEDUP'

          if marker not in s:
              patch = """

    // ============================================================
    // CONTINUE_WATCH_DDD_GLOBAL_BUTTON_DEDUP
    // Убирает дубли кнопки ContinueWatchDDD, если Lampa отрисовала
    // одну и ту же full-карточку в нескольких DOM-зонах.
    // ============================================================

    (function () {
        var scheduled = false;

        function dedupContinueWatchButtons() {
            try {
                var buttons = $('.button--continue-watch-ddd');

                if (buttons.length <= 1) return;

                buttons.slice(1).remove();
            } catch (e) {}
        }

        function scheduleDedup() {
            if (scheduled) return;

            scheduled = true;

            requestAnimationFrame(function () {
                scheduled = false;
                dedupContinueWatchButtons();
            });
        }

        try {
            Lampa.Listener.follow('full', function (event) {
                if (!event || event.type !== 'complite') return;

                scheduleDedup();

                setTimeout(function () {
                    dedupContinueWatchButtons();
                }, 300);
            });
        } catch (e) {}
    })();
"""

              idx = s.rfind('\n})();')

              if idx == -1:
                  raise SystemExit('final plugin close not found')

              s = s[:idx] + patch + s[idx:]

          if s != old:
              p.write_text(s, encoding='utf-8')
              print('global dedup patched')
          else:
              print('no changes')
          PY

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ContinueWatching.js
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Add global ContinueWatching button dedup guard"
          git push

