name: Fix ContinueWatching button dedup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-continuewatching-dedup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch ContinueWatching.js
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('ContinueWatching.js')
          text = path.read_text(encoding='utf-8')

          original = text

          text = text.replace(
              "var PLUGIN_VERSION = 'v3.1.0-anime-playlist-fixed-20260507';",
              "var PLUGIN_VERSION = 'v3.1.1-button-dedup-20260511';"
          )

          text = text.replace(
              "var UIManager = (function () {\n        var debounceTimer = null;",
              "var UIManager = (function () {\n        var debounceTimer = null;\n        var installed = false;"
          )

          install_block = r"""        function install() {
            if (installed) return;
            installed = true;

            Lampa.Listener.follow('full', function (event) {
                if (!event || event.type !== 'complite') return;

                requestAnimationFrame(function () {
                    try {
                        var activity = event.object && event.object.activity;
                        var render = activity && activity.render ? activity.render() : null;
                        var movie = event.data && event.data.movie;

                        if (!render || !movie) return;

                        var params = StorageManager.getLastStreamParams(movie);
                        if (!params) return;

                        var existing = render.find('.button--continue-watch-ddd');

                        if (existing.length > 1) {
                            existing.slice(1).remove();
                            existing = existing.eq(0);
                        }

                        if (existing.length) {
                            var existingButton = existing.eq(0);

                            updateButton(existingButton, movie, params);

                            existingButton
                                .off('hover:enter.continueWatchDDD')
                                .on('hover:enter.continueWatchDDD', function () {
                                    handleClick(movie, this);
                                });

                            return;
                        }

                        $('.button--continue-watch-ddd').each(function () {
                            if (render[0] && !$.contains(render[0], this)) {
                                $(this).remove();
                            }
                        });

                        var button = createButton(movie, params);

                        button
                            .off('hover:enter.continueWatchDDD')
                            .on('hover:enter.continueWatchDDD', function () {
                                handleClick(movie, this);
                            });

                        insertAfterBestPlace(render, button);

                        /*
                         * DDD статус отключён в чистой версии.
                         *
                         * if (CONFIG.debugStatusButton && CONFIG.debugNoty) {
                         *     var debugExisting = render.find('.button--continue-watch-ddd-debug');
                         *
                         *     if (debugExisting.length) {
                         *         bindStatusButton(debugExisting, movie);
                         *     } else {
                         *         var debugButton = createStatusButton(movie);
                         *         render.find('.button--continue-watch-ddd').after(debugButton);
                         *     }
                         * }
                         */
                    } catch (e) {
                        Utils.error('Button render failed', e);
                    }
                });
            });
        }
"""

          pattern = re.compile(
              r"        function install\(\) \{\n"
              r"            Lampa\.Listener\.follow\('full', function \(event\) \{.*?"
              r"\n        \}\n\n        function createButton",
              re.S
          )

          text, count = pattern.subn(install_block + "\n        function createButton", text, count=1)

          if count != 1:
              raise SystemExit(f'install() patch failed: matched {count} blocks')

          if 'var installed = false;' not in text:
              raise SystemExit('installed guard was not inserted')

          if text == original:
              print('No changes needed')
              raise SystemExit(0)

          path.write_text(text, encoding='utf-8')

      - name: Commit patched ContinueWatching.js
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ContinueWatching.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Fix duplicate ContinueWatching button"
          git push
