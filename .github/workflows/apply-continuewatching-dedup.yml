name: Apply ContinueWatching dedup

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-continuewatching-dedup.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import base64

          path = Path('ContinueWatching.js')
          text = path.read_text(encoding='utf-8')
          old = text

          text = text.replace(
              "var PLUGIN_VERSION = 'v3.1.1-button-dedup-20260511';",
              "var PLUGIN_VERSION = 'v3.1.2-button-global-dedup-20260511';"
          )

          marker = 'ContinueWatchDDD global button dedup'

          patch_b64 = ''
          patch = base64.b64decode(patch_b64).decode('utf-8')

          if marker not in text:
              close = '\n})();'
              idx = text.rfind(close)
              if idx < 0:
                  raise SystemExit('final IIFE close not found')
              text = text[:idx] + patch + text[idx:]

          if text == old:
              print('No changes')
          else:
              path.write_text(text, encoding='utf-8')
              print('ContinueWatching.js patched')
          PY

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ContinueWatching.js
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Add global ContinueWatching button dedup guard"
          git push

